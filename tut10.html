<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Id's and classes in HTML</title>
</head>

<body>
    <h3>Id's and classes tutorial</h3>
    <div id="mainBox" class="redBg blackBorder"></div>
    <!-- here we have a div tag and we have given it an id of mainBox and two classes redBg and blackBorder. -->
    <!-- id's are used to identify a particular element and classes are used to identify a group of elements. -->
    <!-- we can use the same class for multiple elements but we cannot use the same id for multiple elements. -->
    <span class="redBg"></span>
<!-- Emmet -->
 <!-- . is for class and # is for id.  -->
 <span class="redBg"></span>
 <span id="mainSpain"></span>
 <!-- Emmet takes div tag as default -->
<div class="blackBackground"></div>
<!-- we write .blackBackground and press enter it will generate this div tag for us with the class name blackBackground. -->


<!-- CREATING MULTIPLE ELEMENTS WITH EMETT -->
<!-- span.myClass.myClass2.myClass3 + <Tab>-->
<span class="myClass myClass2 myClass3">first</span>
<span class="myClass myClass2 myClass3">second</span>
<span class="myClass myClass2 myClass3">third</span>
<span class="myClass myClass2 myClass3">fourth</span>






</body>

</html>

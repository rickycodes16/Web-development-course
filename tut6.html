<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links and images</title>
</head>
<body>
  <a href="https://www.google.com" target="_blank"> Go to Google </a><br> 
    <!-- This is how we write a link in html. a is the anchor tag and href is the attribute of anchor tag and in href we write the url of the website where we want to go when we click on the link. -->
   <a href="https://www.youtube.com" target="_blank"> Go to Youtube </a><br>
   <a href="https://www.Linkedin.com" target="_blank"> Go to Linkedin </a><br>
   <a href="https://playvalorant.com" target="_blank"> Go to Valorant </a><br>

   <a href="/tut5.html" target="_blank"> Tut 5 </a></br>

   <!-- here target="_blank" is an attribute that means that the link will open in a new tab. -->

   <img src="ricky.jpg" alt="Error 404 mf"><br>
   <img src="https://www.sourcesplash.com/i/random?q=architecture" alt="Error 404 mf">

    <!-- This is how we add an image in html. img is the image tag and src is the attribute of img tag and in src we write the path of the image that we want to add. alt is also an attribute of img tag and in alt we write the text that we want to show when the image is not found. -->
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and block elements</title>
</head>
<body>
    <p>this is a paragraph</p> <p>this is also a paragraph</p>
    <span>this is a span </span> <span>this is also a span </span>

     <!-- Here, p is a block element which will take the whole width of the page and will start from a new line. -->

     <!-- Here, span is an inline element which will not take the whole width of the page and will not start from a new line. It will be in the same line as the previous element. -->
      
</body>
</html>
